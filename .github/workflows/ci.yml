# StadiumOps — CI/CD Pipeline
# Triggered on every push and pull request to main.
# Steps: install dependencies → lint with flake8 → run pytest

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Cache pip dependencies to speed up subsequent runs
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install project dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 5. Lint: fail if there are syntax errors or undefined names (E9, F)
      #    Style warnings (E, W) are reported but don't fail the build
      - name: Lint with flake8
        run: |
          flake8 app/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ tests/ --count --max-line-length=100 --statistics

      # 6. Run the test suite
      - name: Run tests with pytest
        run: pytest tests/ -v --tb=short
        env:
          SECRET_KEY: ci-test-secret-key
